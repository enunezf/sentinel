version: "3.9"

services:
  auth-service:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - DB_HOST=postgres
      - DB_NAME=sentinel
      - DB_USER=sentinel
      - DB_PASSWORD=sentinel_dev
      - REDIS_ADDR=redis:6379
      - REDIS_PASSWORD=
      - JWT_PRIVATE_KEY_PATH=/app/keys/private.pem
      - JWT_PUBLIC_KEY_PATH=/app/keys/public.pem
      - BOOTSTRAP_ADMIN_USER=admin
      - BOOTSTRAP_ADMIN_PASSWORD=Admin@12345!
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./keys:/app/keys:ro
    networks:
      - sentinel-internal

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: sentinel
      POSTGRES_USER: sentinel
      POSTGRES_PASSWORD: sentinel_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sentinel"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - sentinel-internal

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - sentinel-internal

volumes:
  postgres_data:
  redis_data:

networks:
  sentinel-internal:
    driver: bridge
