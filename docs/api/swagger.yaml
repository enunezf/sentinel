host: localhost:8080
info:
  contact: {}
  description: Servicio centralizado de autenticación y autorización con JWT RS256,
    RBAC y auditoría.
  title: Sentinel API
  version: "1.0"
paths:
  /.well-known/jwks.json:
    get:
      description: Retorna las claves públicas RSA en formato JWKS para verificación
        de tokens JWT.
      produces:
      - application/json
      responses:
        "200":
          description: Conjunto de claves JWKS
          schema:
            additionalProperties: true
            type: object
      summary: Claves públicas JWKS
      tags:
      - Sistema
  /admin/applications:
    get:
      description: Retorna la lista paginada de aplicaciones cliente registradas en
        el sistema.
      parameters:
      - description: Clave secreta de la aplicación
        in: header
        name: X-App-Key
        required: true
        type: string
      - description: 'Token JWT. Formato: Bearer {token}'
        in: header
        name: Authorization
        required: true
        type: string
      - description: 'Número de página (default: 1)'
        in: query
        name: page
        type: integer
      - description: 'Elementos por página (default: 20, max: 100)'
        in: query
        name: page_size
        type: integer
      - description: Búsqueda por nombre o slug
        in: query
        name: search
        type: string
      - description: Filtrar por estado activo
        in: query
        name: is_active
        type: boolean
      produces:
      - application/json
      responses:
        "200":
          description: Lista paginada de aplicaciones
          schema:
            $ref: '#/definitions/internal_handler.SwaggerPaginatedApplications'
        "401":
          description: No autenticado
          schema:
            $ref: '#/definitions/internal_handler.SwaggerErrorResponse'
        "403":
          description: Sin permiso
          schema:
            $ref: '#/definitions/internal_handler.SwaggerErrorResponse'
      security:
      - BearerAuth: []
      - AppKeyAuth: []
      summary: Listar aplicaciones
      tags:
      - Aplicaciones
    post:
      consumes:
      - application/json
      description: Registra una nueva aplicación cliente en el sistema y genera su
        clave secreta.
      parameters:
      - description: Clave secreta de la aplicación
        in: header
        name: X-App-Key
        required: true
        type: string
      - description: 'Token JWT. Formato: Bearer {token}'
        in: header
        name: Authorization
        required: true
        type: string
      - description: Datos de la nueva aplicación
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_handler.SwaggerCreateApplicationRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Aplicación creada exitosamente
          schema:
            $ref: '#/definitions/internal_handler.SwaggerApplicationItem'
        "400":
          description: Datos inválidos o slug con formato incorrecto
          schema:
            $ref: '#/definitions/internal_handler.SwaggerErrorResponse'
        "401":
          description: No autenticado
          schema:
            $ref: '#/definitions/internal_handler.SwaggerErrorResponse'
        "403":
          description: Sin permiso
          schema:
            $ref: '#/definitions/internal_handler.SwaggerErrorResponse'
        "409":
          description: Ya existe una aplicación con este slug
          schema:
            $ref: '#/definitions/internal_handler.SwaggerErrorResponse'
      security:
      - BearerAuth: []
      - AppKeyAuth: []
      summary: Crear aplicación
      tags:
      - Aplicaciones
  /admin/applications/{id}:
    get:
      description: Retorna los detalles de una aplicación, incluyendo su clave secreta.
      parameters:
      - description: Clave secreta de la aplicación
        in: header
        name: X-App-Key
        required: true
        type: string
      - description: 'Token JWT. Formato: Bearer {token}'
        in: header
        name: Authorization
        required: true
        type: string
      - description: ID de la aplicación (UUID)
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Detalles de la aplicación
          schema:
            $ref: '#/definitions/internal_handler.SwaggerApplicationItem'
        "400":
          description: ID inválido
          schema:
            $ref: '#/definitions/internal_handler.SwaggerErrorResponse'
        "401":
          description: No autenticado
          schema:
            $ref: '#/definitions/internal_handler.SwaggerErrorResponse'
        "403":
          description: Sin permiso
          schema:
            $ref: '#/definitions/internal_handler.SwaggerErrorResponse'
        "404":
          description: Aplicación no encontrada
          schema:
            $ref: '#/definitions/internal_handler.SwaggerErrorResponse'
      security:
      - BearerAuth: []
      - AppKeyAuth: []
      summary: Obtener aplicación
      tags:
      - Aplicaciones
    put:
      consumes:
      - application/json
      description: Actualiza el nombre y/o estado de una aplicación. La aplicación
        del sistema no puede ser modificada.
      parameters:
      - description: Clave secreta de la aplicación
        in: header
        name: X-App-Key
        required: true
        type: string
      - description: 'Token JWT. Formato: Bearer {token}'
        in: header
        name: Authorization
        required: true
        type: string
      - description: ID de la aplicación (UUID)
        in: path
        name: id
        required: true
        type: string
      - description: Campos a actualizar
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_handler.SwaggerUpdateApplicationRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Aplicación actualizada
          schema:
            $ref: '#/definitions/internal_handler.SwaggerApplicationItem'
        "400":
          description: Datos inválidos
          schema:
            $ref: '#/definitions/internal_handler.SwaggerErrorResponse'
        "401":
          description: No autenticado
          schema:
            $ref: '#/definitions/internal_handler.SwaggerErrorResponse'
        "403":
          description: Sin permiso o aplicación de sistema
          schema:
            $ref: '#/definitions/internal_handler.SwaggerErrorResponse'
        "404":
          description: Aplicación no encontrada
          schema:
            $ref: '#/definitions/internal_handler.SwaggerErrorResponse'
      security:
      - BearerAuth: []
      - AppKeyAuth: []
      summary: Actualizar aplicación
      tags:
      - Aplicaciones
  /admin/applications/{id}/rotate-key:
    post:
      description: Genera una nueva clave secreta para la aplicación, invalidando
        la anterior. La aplicación del sistema no puede rotar su clave por esta vía.
      parameters:
      - description: Clave secreta de la aplicación
        in: header
        name: X-App-Key
        required: true
        type: string
      - description: 'Token JWT. Formato: Bearer {token}'
        in: header
        name: Authorization
        required: true
        type: string
      - description: ID de la aplicación (UUID)
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Nueva clave generada
          schema:
            $ref: '#/definitions/internal_handler.SwaggerRotateKeyResponse'
        "400":
          description: ID inválido
          schema:
            $ref: '#/definitions/internal_handler.SwaggerErrorResponse'
        "401":
          description: No autenticado
          schema:
            $ref: '#/definitions/internal_handler.SwaggerErrorResponse'
        "403":
          description: Sin permiso o aplicación de sistema
          schema:
            $ref: '#/definitions/internal_handler.SwaggerErrorResponse'
        "404":
          description: Aplicación no encontrada
          schema:
            $ref: '#/definitions/internal_handler.SwaggerErrorResponse'
      security:
      - BearerAuth: []
      - AppKeyAuth: []
      summary: Rotar clave de aplicación
      tags:
      - Aplicaciones
  /admin/audit-logs:
    get:
      description: Retorna la lista paginada de eventos de auditoría. Permite filtrar
        por tipo de evento, usuario, actor, aplicación, fechas y resultado.
      parameters:
      - description: Clave secreta de la aplicación
        in: header
        name: X-App-Key
        required: true
        type: string
      - description: 'Token JWT. Formato: Bearer {token}'
        in: header
        name: Authorization
        required: true
        type: string
      - description: 'Número de página (default: 1)'
        in: query
        name: page
        type: integer
      - description: 'Elementos por página (default: 20, max: 100)'
        in: query
        name: page_size
        type: integer
      - description: 'Filtrar por tipo de evento (ej: LOGIN_SUCCESS)'
        in: query
        name: event_type
        type: string
      - description: Filtrar por ID de usuario (UUID)
        in: query
        name: user_id
        type: string
      - description: Filtrar por ID del actor (UUID)
        in: query
        name: actor_id
        type: string
      - description: Filtrar por ID de aplicación (UUID)
        in: query
        name: application_id
        type: string
      - description: 'Fecha inicio (RFC3339, ej: 2025-01-01T00:00:00Z)'
        in: query
        name: from_date
        type: string
      - description: 'Fecha fin (RFC3339, ej: 2025-12-31T23:59:59Z)'
        in: query
        name: to_date
        type: string
      - description: Filtrar por resultado (true=exitoso, false=fallido)
        in: query
        name: success
        type: boolean
      produces:
      - application/json
      responses:
        "200":
          description: Lista paginada de registros de auditoría
          schema:
            $ref: '#/definitions/internal_handler.SwaggerPaginatedAuditLogs'
        "401":
          description: No autenticado
          schema:
            $ref: '#/definitions/internal_handler.SwaggerErrorResponse'
        "403":
          description: Sin permiso
          schema:
            $ref: '#/definitions/internal_handler.SwaggerErrorResponse'
      security:
      - BearerAuth: []
      - AppKeyAuth: []
      summary: Listar registros de auditoría
      tags:
      - Auditoría
